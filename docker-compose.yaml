services:
  nuxt-vue-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nuxt-vue-demo
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    restart: unless-stopped

volumes:
  node_modules:
